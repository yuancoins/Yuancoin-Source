<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Artisan - Yuanverse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505; color: white; font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(5,5,5,0.9), rgba(5,5,5,0.9)), url('Yuanverse_banner.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .gradient-text {
            background: linear-gradient(90deg, #9333ea, #db2777);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px;
        }
        
        /* FIX VISIBILITÉ LISTE DÉROULANTE */
        input, select, textarea {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            appearance: none; /* Enlever le style par défaut du navigateur */
        }
        
        /* Force le fond noir pour les options de la liste */
        select option {
            background-color: #1a1a1a !important; /* Fond gris très foncé */
            color: white !important; /* Texte blanc */
        }

        .btn-purple { background: linear-gradient(90deg, #9333ea, #db2777); transition: all 0.3s ease; }
        .btn-purple:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(147, 51, 234, 0.3); }
        
        .social-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.3s ease; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .social-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.15); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">
        <a href="index.html" class="text-gray-400 hover:text-white transition text-sm">← Retour au Wallet</a>
        <div class="text-2xl font-bold gradient-text tracking-tighter">YUANVERSE ARTISANS</div>
        <div class="w-10"></div>
    </nav>

    <main class="max-w-3xl mx-auto mt-10 p-6">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black mb-4 text-white uppercase tracking-tight">Rejoignez <span class="gradient-text">L'Élite</span></h1>
            <p class="text-gray-400 text-sm px-10">Inscrivez votre atelier et commencez à recevoir vos premiers YCC.</p>
        </div>

        <div class="glass-card p-8 md:p-12 mb-8">
            <form id="artisanForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Nom de l'atelier</label>
                        <input type="text" required placeholder="Ex: Maroquinerie Royale" class="w-full p-4 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Domaine d'expertise</label>
                        <select id="domaineSelect" class="w-full p-4 rounded-xl cursor-pointer">
                            <option value="" disabled selected>Choisir une spécialité...</option>
                            <option>Menuiserie & Ébénisterie</option>
                            <option>Bijouterie & Joaillerie</option>
                            <option>Couture & Design Textile</option>
                            <option>Maroquinerie (Cuir)</option>
                            <option>Poterie & Céramique</option>
                            <option>Horlogerie d'art</option>
                            <option>Forge & Ferronnerie</option>
                            <option>Lutherie</option>
                            <option>Soufflage de Verre</option>
                            <option>Gastronomie & Terroir</option>
                            <option>Restauration d'art</option>
                            <option>Autre Savoir-Faire</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Lien Portfolio / Réseaux</label>
                    <input type="url" placeholder="https://instagram.com/votre_atelier" class="w-full p-4 rounded-xl">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Adresse Wallet YCC</label>
                    <input type="text" required placeholder="0x..." class="w-full p-4 rounded-xl font-mono text-xs">
                </div>

                <div>
                    <button type="submit" class="w-full btn-purple py-4 rounded-xl font-bold text-white shadow-lg uppercase tracking-widest text-xs">
                        Soumettre ma candidature
                    </button>
                </div>
            </form>
        </div>

        <div class="glass-card p-6 text-center">
            <h4 class="text-xs font-bold text-gray-400 uppercase mb-4 tracking-widest">Partager cet espace</h4>
            <div class="flex justify-center gap-4">
                <a href="https://wa.me/?text=Inscris ton atelier sur le Yuanverse !" target="_blank" class="social-btn text-green-500">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                </a>
                <a href="https://t.me/share/url?url=https://yuanverse.github.io/artisan.html" target="_blank" class="social-btn text-blue-400">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18.717-.962 4.084-1.362 5.441-.168.564-.493.753-.701.772-1.054.101-1.854-.692-2.873-1.359-1.594-1.044-2.494-1.693-4.043-2.712-1.787-1.177-.628-1.824.391-2.88.266-.276 4.887-4.482 4.977-4.863.011-.048.02-.227-.086-.321s-.26-.062-.371-.038c-.158.034-2.67 1.696-7.534 4.984-.713.49-1.358.729-1.936.717-.638-.013-1.865-.361-2.776-.657-1.119-.364-2.007-.556-1.929-1.174.04-.321.481-.65 1.323-.986 5.176-2.253 8.629-3.739 10.358-4.461 4.925-2.055 5.947-2.411 6.613-2.423.147-.003.473.034.685.206s.245.43.272.585c.03.176.037.38.033.585z"/></svg>
                </a>
            </div>
            <button onclick="copyLink()" class="mt-6 text-[10px] text-gray-400 hover:text-white transition uppercase tracking-widest flex items-center justify-center gap-2 w-full">
                <span id="copyText">Copier le lien direct</span>
            </button>
        </div>
    </main>

    <script>
        document.getElementById('artisanForm').onsubmit = function(e) {
            e.preventDefault();
            alert("Merci ! Candidature envoyée.");
        }
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            document.getElementById('copyText').innerText = "LIEN COPIÉ !";
            setTimeout(() => { document.getElementById('copyText').innerText = "Copier le lien direct"; }, 2000);
        }
    </script>
</body>
</html>
