<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Artisan - Yuanverse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505; color: white; font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(5,5,5,0.9), rgba(5,5,5,0.9)), url('Yuanverse_banner.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .gradient-text {
            background: linear-gradient(90deg, #9333ea, #db2777);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px;
        }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        .btn-purple { background: linear-gradient(90deg, #9333ea, #db2777); transition: all 0.3s ease; }
        .btn-purple:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(147, 51, 234, 0.3); }
        
        /* Styles Boutons Sociaux */
        .social-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.3s ease; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .social-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.15); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">
        <a href="index.html" class="text-gray-400 hover:text-white transition text-sm">← Retour au Wallet</a>
        <div class="text-2xl font-bold gradient-text tracking-tighter">YUANVERSE ARTISANS</div>
        <div class="w-10"></div>
    </nav>

    <main class="max-w-3xl mx-auto mt-10 p-6">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black mb-4 text-white uppercase tracking-tight">Rejoignez <span class="gradient-text">L'Élite</span></h1>
            <p class="text-gray-400 text-sm px-10">Inscrivez votre atelier et commencez à recevoir vos premiers YCC.</p>
        </div>

        <div class="glass-card p-8 md:p-12 mb-8">
            <form id="artisanForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Nom de l'atelier</label>
                        <input type="text" required placeholder="Ex: Maroquinerie Royale" class="w-full p-3 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Domaine</label>
                        <select class="w-full p-3 rounded-xl">
                            <option>Bijouterie & Joaillerie</option>
                            <option>Maroquinerie & Cuir</option>
                            <option>Menuiserie & Design</option>
                            <option>Mode & Haute Couture</option>
                            <option>Gastronomie d'Exception</option>
                            <option>Horlogerie</option>
                            <option>Autre Savoir-Faire</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Lien Portfolio / Réseaux</label>
                    <input type="url" placeholder="https://..." class="w-full p-3 rounded-xl">
                </div>
                <div>
                    <button type="submit" class="w-full btn-purple py-4 rounded-xl font-bold text-white shadow-lg uppercase tracking-widest text-xs">
                        Soumettre ma candidature
                    </button>
                </div>
            </form>
        </div>

                <span id="copyText">Copier le lien direct</span>
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            </button>
        </div>
    </main>

    <script>
        document.getElementById('artisanForm').onsubmit = function(e) {
            e.preventDefault();
            alert("Merci ! Candidature envoyée.");
        }

        function copyLink() {
            const el = document.createElement('textarea');
            el.value = window.location.href;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const copyBtnText = document.getElementById('copyText');
            copyBtnText.innerText = "LIEN COPIÉ !";
            copyBtnText.classList.add('text-purple-400');
            setTimeout(() => {
                copyBtnText.innerText = "Copier le lien direct";
                copyBtnText.classList.remove('text-purple-400');
            }, 2000);
        }
    </script>
</body>
</html>
