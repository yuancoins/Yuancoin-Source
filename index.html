<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuanverse Wallet 2.0 - YCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(5, 5, 5, 0.85), rgba(5, 5, 5, 0.85)), url('Yuanverse_banner.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .gradient-text {
            background: linear-gradient(90deg, #d4af37, #9333ea, #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #d4af37, #9333ea);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">
        <div class="text-3xl font-bold gradient-text tracking-tighter">YUANVERSE 2.0</div>
        <button id="connectWallet" class="btn-primary px-7 py-2.5 rounded-full font-semibold shadow-lg">
            Connexion Wallet
        </button>
    </nav>

    <main class="max-w-4xl mx-auto mt-8 p-6 text-center">
        <h1 class="text-5xl font-extrabold mb-4 tracking-tight">Gérez vos <span class="gradient-text">YCC</span></h1>
        
        <div class="glass-card p-10 shadow-2xl mb-10 relative flex flex-col items-center">
            <div class="mb-6 w-24 h-24 flex items-center justify-center">
                <img src="./assets/logo_yuanverse_v2.png" alt="YCC Logo" class="w-full h-full object-contain">
            </div>
            
            <h2 class="text-xs uppercase tracking-[0.3em] text-gray-400 mb-4 text-center">Solde actuel</h2>
            <div id="balanceText" class="text-6xl font-black mb-6 tracking-tighter text-white">
                0 <span class="text-xl font-light text-yellow-500">YCC</span>
            </div>
            
            <div class="flex flex-wrap justify-center gap-4 w-full">
                <button class="bg-white/10 px-10 py-3 rounded-xl font-bold border border-white/5">Envoyer</button>
                <button class="bg-white/10 px-10 py-3 rounded-xl font-bold border border-white/5">Recevoir</button>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURATION
        const contractAddress = "0xd190812c51a1abe1078f23dc6f5453830e59e550";
        const tokenAbi = ["function balanceOf(address) view returns (uint256)"];

        const connectBtn = document.getElementById('connectWallet');
        const balanceDisplay = document.getElementById('balanceText');

        async function updateBalance() {
            if (!window.ethereum) {
                alert("MetaMask non détecté !");
                return;
            }

            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                
                // On force la demande de compte
                const accounts = await provider.send("eth_requestAccounts", []);
                const userAddress = accounts[0];

                // On vérifie le réseau (doit être 56 pour BSC)
                const { chainId } = await provider.getNetwork();
                if (chainId !== 56) {
                    alert("Tu es sur le mauvais réseau ! Switch sur BNB Smart Chain dans MetaMask.");
                    return;
                }

                connectBtn.innerText = userAddress.substring(0,6) + "..." + userAddress.substring(userAddress.length - 4);
                connectBtn.style.background = "#16a34a";

                // Création du contrat avec un délai d'attente
                const contract = new ethers.Contract(contractAddress, tokenAbi, provider);
                
                // Appel du solde avec une sécurité
                const balance = await contract.callStatic.balanceOf(userAddress);
                
                const formattedBalance = ethers.utils.formatUnits(balance, 18);
                const finalValue = parseFloat(formattedBalance).toLocaleString('fr-FR');

                balanceDisplay.innerHTML = `${finalValue} <span class="text-xl font-light text-yellow-500">YCC</span>`;

            } catch (err) {
                console.error("Erreur complète :", err);
                // Si l'erreur est encore CALL_EXCEPTION, c'est que le contrat n'est pas vu sur le noeud actuel
                alert("Erreur de lecture. Assure-toi d'avoir des YCC sur ce wallet ou d'être bien sur le réseau principal.");
            }
        }

        connectBtn.addEventListener('click', updateBalance);
    </script>
</body>
</html>
