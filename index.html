<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuanverse Wallet 2.0 - YCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            background-color: #050505; color: white; font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(5,5,5,0.85), rgba(5,5,5,0.85)), url('Yuanverse_banner.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .gradient-text {
            background: linear-gradient(90deg, #d4af37, #9333ea, #db2777);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px;
            transition: all 0.3s ease;
        }
        .btn-primary { background: linear-gradient(90deg, #d4af37, #9333ea); transition: all 0.3s ease; }
        .btn-telegram { background: #0088cc; transition: all 0.3s ease; }
        .btn-telegram:hover { background: #0077b5; transform: translateY(-2px); }
        .btn-outline { border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        
        /* Style de la fenêtre Recevoir */
        #receiveModal { display: none; }
        .modal-overlay { background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">
        <div class="text-3xl font-bold gradient-text tracking-tighter">YUANVERSE 2.0</div>
        <button id="connectWallet" class="btn-primary px-7 py-2.5 rounded-full font-semibold shadow-lg text-white">Connexion Wallet</button>
    </nav>

    <main class="max-w-4xl mx-auto mt-8 p-6 text-center">
        <h1 class="text-5xl font-extrabold mb-4 tracking-tight text-white">Gérez vos <span class="gradient-text">YCC</span></h1>
        
        <div class="glass-card p-10 shadow-2xl mb-10 relative flex flex-col items-center">
            <div class="mb-6 w-24 h-24">
                <img src="./assets/logo_yuanverse_v2.png" alt="YCC Logo" class="w-full h-full object-contain">
            </div>
            
            <h2 class="text-xs uppercase tracking-[0.3em] text-gray-400 mb-2">Solde actuel</h2>
            <div id="balanceText" class="text-6xl font-black mb-8 tracking-tighter text-white">0 <span class="text-xl font-light text-yellow-500">YCC</span></div>
            
            <div class="flex flex-col gap-3 w-full max-w-xs">
                <div class="flex gap-2">
                    <button class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl font-bold border border-white/5 transition text-white">Envoyer</button>
                    <button onclick="openReceiveModal()" class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl font-bold border border-white/5 transition text-white">Recevoir</button>
                </div>
                
                <a href="https://t.me/teamyuancoin" target="_blank" class="btn-telegram flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-white shadow-lg">
                    Communauté Telegram
                </a>

                <button onclick="addYccToWallet()" class="btn-outline flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-white text-sm">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/MetaMask_Fox.svg/960px-MetaMask_Fox.svg.png" class="w-5 h-5" alt="MetaMask">
                    Ajouter YCC à MetaMask
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
            <div class="glass-card p-8 border-l-4 border-purple-500">
                <h3 class="text-xl font-bold mb-2 text-white">Espace Artisan</h3>
                <p class="text-gray-400 text-sm">Prêt pour l'économie du futur.</p>
            </div>
            <div class="glass-card p-8 border-l-4 border-yellow-500">
                <h3 class="text-xl font-bold mb-2 text-white">Staking</h3>
                <p class="text-gray-400 text-sm">Gagnez des récompenses en YCC.</p>
            </div>
        </div>
    </main>

    <div id="receiveModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
        <div class="glass-card w-full max-w-md p-8 text-center relative border-yellow-500/30">
            <button onclick="closeReceiveModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white">✕</button>
            <h3 class="text-2xl font-bold mb-6">Recevoir des <span class="text-yellow-500">YCC</span></h3>
            <p class="text-gray-400 text-sm mb-4">Votre adresse publique :</p>
            
            <div id="userAddressDisplay" class="bg-black/50 p-4 rounded-xl border border-white/10 text-xs break-all font-mono mb-6 text-yellow-500">
                Connectez votre wallet d'abord
            </div>

            <button id="copyBtn" onclick="copyAddress()" class="w-full btn-primary py-3 rounded-xl font-bold text-white">
                Copier l'adresse
            </button>
        </div>
    </div>

    <script>
        const tokenContractAddress = "0x4E87b198A814a89E47405E4904f97d8A0e31BE95"; 
        const minABI = [{"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"}];
        
        let currentUserAddress = "";
        const connectBtn = document.getElementById('connectWallet');
        const balanceDisplay = document.getElementById('balanceText');
        const receiveModal = document.getElementById('receiveModal');
        const userAddressDisplay = document.getElementById('userAddressDisplay');

        // FONCTIONS MODAL
        function openReceiveModal() {
            if (!currentUserAddress) {
                alert("Connectez votre wallet d'abord !");
                return;
            }
            userAddressDisplay.innerText = currentUserAddress;
            receiveModal.style.display = "flex";
        }

        function closeReceiveModal() {
            receiveModal.style.display = "none";
        }

        function copyAddress() {
            navigator.clipboard.writeText(currentUserAddress);
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerText = "Copié !";
            copyBtn.style.background = "#16a34a";
            setTimeout(() => {
                copyBtn.innerText = "Copier l'adresse";
                copyBtn.style.background = "";
            }, 2000);
        }

        async function connect() {
            if (!window.ethereum) return alert("MetaMask non détecté !");
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                currentUserAddress = accounts[0];

                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const contract = new ethers.Contract(tokenContractAddress, minABI, provider);
                const balance = await contract.balanceOf(currentUserAddress);
                const formatted = ethers.utils.formatUnits(balance, 18);
                
                connectBtn.innerText = currentUserAddress.substring(0,6) + "..." + currentUserAddress.substring(currentUserAddress.length - 4);
                connectBtn.style.background = "#16a34a";
                const finalValue = parseFloat(formatted).toLocaleString('fr-FR', { maximumFractionDigits: 0 });
                balanceDisplay.innerHTML = `${finalValue} <span class="text-xl font-light text-yellow-500">YCC</span>`;
            } catch (err) { console.error(err); }
        }

        async function addYccToWallet() {
            if (!window.ethereum) return;
            try {
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: { address: tokenContractAddress, symbol: 'YCC', decimals: 18, image: 'https://yuanverse.github.io/assets/logo_yuanverse_v2.png' },
                    },
                });
            } catch (e) { console.error(e); }
        }

        connectBtn.onclick = connect;
    </script>
</body>
</html>
