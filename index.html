<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuanverse Wallet 2.0 - YCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            background-color: #050505; color: white; font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(5,5,5,0.85), rgba(5,5,5,0.85)), url('Yuanverse_banner.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .gradient-text {
            background: linear-gradient(90deg, #d4af37, #9333ea, #db2777);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px;
            transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(212, 175, 55, 0.4); }
        .btn-primary { background: linear-gradient(90deg, #d4af37, #9333ea); transition: all 0.3s ease; }
        .btn-telegram { background: #0088cc; transition: all 0.3s ease; }
        .btn-telegram:hover { background: #0077b5; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4); }
        .btn-outline { border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.15); border-color: #d4af37; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">
        <div class="text-3xl font-bold gradient-text tracking-tighter">YUANVERSE 2.0</div>
        <button id="connectWallet" class="btn-primary px-7 py-2.5 rounded-full font-semibold shadow-lg text-white">Connexion Wallet</button>
    </nav>

    <main class="max-w-4xl mx-auto mt-8 p-6 text-center">
        <h1 class="text-5xl font-extrabold mb-4 tracking-tight text-white">Gérez vos <span class="gradient-text">YCC</span></h1>
        
        <div class="glass-card p-10 shadow-2xl mb-10 relative flex flex-col items-center">
            <div class="mb-6 w-24 h-24">
                <img src="./assets/logo_yuanverse_v2.png" alt="YCC Logo" class="w-full h-full object-contain">
            </div>
            
            <h2 class="text-xs uppercase tracking-[0.3em] text-gray-400 mb-2">Solde actuel de votre compte</h2>
            <div id="balanceText" class="text-6xl font-black mb-8 tracking-tighter text-white">0 <span class="text-xl font-light text-yellow-500">YCC</span></div>
            
            <div class="flex flex-col gap-3 w-full max-w-xs">
                <div class="flex gap-2">
                    <button class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl font-bold border border-white/5 transition text-white">Envoyer</button>
                    <button class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl font-bold border border-white/5 transition text-white">Recevoir</button>
                </div>
                
                <a href="https://t.me/teamyuancoin" target="_blank" class="btn-telegram flex items-center justify-center gap-2 py-3 rounded-xl font-bold shadow-lg text-white">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18.717-.962 4.084-1.362 5.441-.168.564-.493.753-.701.772-1.054.101-1.854-.692-2.873-1.359-1.594-1.044-2.494-1.693-4.043-2.712-1.787-1.177-.628-1.824.391-2.88.266-.276 4.887-4.482 4.977-4.863.011-.048.02-.227-.086-.321s-.26-.062-.371-.038c-.158.034-2.67 1.696-7.534 4.984-.713.49-1.358.729-1.936.717-.638-.013-1.865-.361-2.776-.657-1.119-.364-2.007-.556-1.929-1.174.04-.321.481-.65 1.323-.986 5.176-2.253 8.629-3.739 10.358-4.461 4.925-2.055 5.947-2.411 6.613-2.423.147-.003.473.034.685.206s.245.43.272.585c.03.176.037.38.033.585z"/></svg>
                    Communauté Telegram
                </a>

                <button onclick="addYccToWallet()" class="btn-outline flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-white text-sm">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Alpha_Color.svg" class="w-5 h-5" alt="MetaMask">
                    Ajouter YCC à MetaMask
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
            <div class="glass-card p-8 border-l-4 border-purple-500">
                <h3 class="text-xl font-bold mb-2 text-white">Espace Artisan</h3>
                <p class="text-gray-400 text-sm">Exposez votre savoir-faire et recevez des paiements en YCC.</p>
            </div>
            <div class="glass-card p-8 border-l-4 border-yellow-500">
                <h3 class="text-xl font-bold mb-2 text-white">Staking & Rewards</h3>
                <p class="text-gray-400 text-sm">Gagnez des récompenses trimestrielles en conservant vos jetons.</p>
            </div>
        </div>
    </main>

    <footer class="mt-16 text-gray-500 text-xs text-center pb-10">
        &copy; 2026 Yuanverse Ecosystem - Tous droits réservés.
    </footer>

    <script>
        const tokenContractAddress = "0x4E87b198A814a89E47405E4904f97d8A0e31BE95"; 
        const minABI = [{"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"}];

        const connectBtn = document.getElementById('connectWallet');
        const balanceDisplay = document.getElementById('balanceText');

        // FONCTION POUR AJOUTER LE JETON AUTOMATIQUEMENT
        async function addYccToWallet() {
            if (!window.ethereum) return alert("MetaMask non détecté !");
            
            try {
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: tokenContractAddress,
                            symbol: 'YCC',
                            decimals: 18,
                            image: 'https://yuanverse.github.io/assets/logo_yuanverse_v2.png', // URL publique de ton logo
                        },
                    },
                });
            } catch (error) {
                console.error(error);
            }
        }

        async function connect() {
            if (!window.ethereum) return alert("Installez MetaMask !");
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const userAddress = accounts[0];

                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: '0x38' }], 
                    });
                } catch (e) { console.log("Déjà sur BSC"); }

                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const contract = new ethers.Contract(tokenContractAddress, minABI, provider);

                const balance = await contract.balanceOf(userAddress);
                const formatted = ethers.utils.formatUnits(balance, 18);
                
                connectBtn.innerText = userAddress.substring(0,6) + "..." + userAddress.substring(userAddress.length - 4);
                connectBtn.style.background = "#16a34a";
                
                const finalValue = parseFloat(formatted).toLocaleString('fr-FR', { maximumFractionDigits: 0 });
                balanceDisplay.innerHTML = `${finalValue} <span class="text-xl font-light text-yellow-500">YCC</span>`;
            } catch (err) { console.error(err); }
        }
        connectBtn.onclick = connect;
    </script>
</body>
</html>
