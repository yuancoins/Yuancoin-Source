<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuanverse Wallet 2.0 - YCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.8)), url('Yuanverse_banner.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .gradient-text {
            background: linear-gradient(90deg, #d4af37, #9333ea, #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #9333ea, #db2777);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(147, 51, 234, 0.3);
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">
        <div class="text-2xl font-bold gradient-text tracking-tighter">YUANVERSE 2.0</div>
        <button id="connectWallet" class="btn-primary px-6 py-2 rounded-full font-semibold shadow-lg">
            Connexion Wallet
        </button>
    </nav>

    <main class="max-w-4xl mx-auto mt-12 p-6 text-center">
        <h1 class="text-6xl font-extrabold mb-4 tracking-tight">Gérez vos <span class="gradient-text">YCC</span></h1>
        <p class="text-gray-300 mb-10 text-lg max-w-2xl mx-auto">L'écosystème décentralisé nouvelle génération dédié aux artisans français.</p>

        <div class="glass-card p-12 shadow-2xl mb-12 relative overflow-hidden">
            
            <div class="flex justify-center mb-6">
                <img src="./assets/logo_yuanverse_v2.png" alt="YCC Logo" class="w-24 h-24 object-contain opacity-100" onerror="this.style.display='none'">
            </div>
            
            <h2 class="text-xs uppercase tracking-[0.3em] text-gray-400 mb-4">Solde de votre compte</h2>
            <div class="text-7xl font-black mb-6 tracking-tighter">400,000,000 <span class="text-2xl font-light text-yellow-500">YCC</span></div>
            
            <div class="flex flex-wrap justify-center gap-4 mt-10">
                <button class="bg-white/10 hover:bg-white/20 px-10 py-4 rounded-2xl font-bold transition-all border border-white/5">Envoyer</button>
                <button class="bg-white/10 hover:bg-white/20 px-10 py-4 rounded-2xl font-bold transition-all border border-white/5">
